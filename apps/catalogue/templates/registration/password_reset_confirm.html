{% extends "catalogue/base.html" %}
{% block content %}
<section class="section">
    <div class="container container--narrow">
        <h1 class="section-title">Nouveau mot de passe</h1>
        <p class="section-subtitle">Saisissez votre nouveau mot de passe.</p>
        <div class="contact__form-wrapper">
            <form method="post" class="contact__form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="form-group">
                    <label for="id_new_password1">Nouveau mot de passe</label>
                    {{ form.new_password1 }}
                </div>
                <div class="form-group">
                    <label for="id_new_password2">Confirmer le mot de passe</label>
                    {{ form.new_password2 }}
                </div>
                <button type="submit" class="btn btn--primary btn--large">Mettre à jour</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
