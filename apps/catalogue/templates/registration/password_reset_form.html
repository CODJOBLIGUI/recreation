{% extends "catalogue/base.html" %}
{% block content %}
<section class="section">
    <div class="container container--narrow">
        <h1 class="section-title">Mot de passe oublié</h1>
        <p class="section-subtitle">Saisissez votre email pour recevoir un lien de réinitialisation.</p>
        <div class="contact__form-wrapper">
            <form method="post" class="contact__form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="form-group">
                    <label for="id_email">Email</label>
                    {{ form.email }}
                </div>
                <button type="submit" class="btn btn--primary btn--large">Envoyer le lien</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
